    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const App = () => {
        return 
import React, { useState, useEffect, useCallback } from 'react';

// --- Icon Components ---
const CheckCircle = ({ className }) => (
  <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
    <polyline points="22 4 12 14.01 9 11.01"></polyline>
  </svg>
);

const RefreshIcon = ({ className, spinning }) => (
  <svg className={`${className} ${spinning ? 'animate-spin' : ''}`} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.85.84 6.72 2.24"></path>
    <path d="M21 3v9h-9"></path>
  </svg>
);

// --- Custom Local Storage Hook ---
function useLocalStorage(key, initialValue) {
  const [storedValue, setStoredValue] = useState(() => {
    try {
      const item = window.localStorage.getItem(key);
      return item ? JSON.parse(item) : initialValue;
    } catch (error) {
      console.warn("Error reading localStorage", error);
      return initialValue;
    }
  });

  useEffect(() => {
    try {
      window.localStorage.setItem(key, JSON.stringify(storedValue));
    } catch (error) {
      console.warn("Error setting localStorage", error);
    }
  }, [key, storedValue]);

  return [storedValue, setStoredValue];
}

// --- Reusable Input Component ---
const InputField = ({ label, id, value, onChange, type = "number", prefix, suffix, helperText, step="any", disabled = false, rightElement, isSelect = false, options = [], placeholder = "" }) => (
  <div className="w-full">
    <div className="flex justify-between items-end mb-1">
      <label htmlFor={id} className="block text-sm font-medium text-slate-700">{label}</label>
      {rightElement}
    </div>
    <div className="relative rounded-lg shadow-sm">
      {prefix && !isSelect && (
        <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
          <span className="text-slate-500 sm:text-sm">{prefix}</span>
        </div>
      )}
      
      {isSelect ? (
        <select
          id={id}
          value={value}
          onChange={(e) => onChange(e.target.value)}
          className="block w-full rounded-lg py-2.5 pl-3 pr-10 text-slate-900 border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm outline-none bg-white appearance-none"
        >
          {options.map(opt => (
            <option key={opt.value} value={opt.value}>{opt.label}</option>
          ))}
        </select>
      ) : (
        <input
          type={type}
          id={id}
          value={value}
          onChange={(e) => onChange(e.target.value)}
          step={step}
          min="0"
          placeholder={placeholder}
          disabled={disabled}
          className={`block w-full rounded-lg py-2.5 sm:text-sm outline-none transition-colors border
            ${disabled ? 'bg-slate-50 text-slate-500 border-slate-200' : 'focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 border-slate-300'}
            ${prefix ? 'pl-8' : 'pl-3'}
            ${suffix ? 'pr-8' : 'pr-3'}
          `}
        />
      )}
      
      {suffix && !isSelect && (
        <div className="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
          <span className="text-slate-500 sm:text-sm">{suffix}</span>
        </div>
      )}

      {isSelect && (
        <div className="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
          <svg className="h-5 w-5 text-slate-400" viewBox="0 0 20 20" fill="currentColor">
            <path fillRule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clipRule="evenodd" />
          </svg>
        </div>
      )}
    </div>
    {helperText && <p className="mt-1.5 text-xs text-slate-500">{helperText}</p>}
  </div>
);

export default function App() {
  // State Variables (Now using Local Storage)
  const [ticker, setTicker] = useLocalStorage("opts_ticker", "NXT.L");
  const [shares, setShares] = useLocalStorage("opts_shares", "1000");
  const [optionPrice, setOptionPrice] = useLocalStorage("opts_optionPrice", "45.00");
  const [salePrice, setSalePrice] = useLocalStorage("opts_salePrice", "85.00");
  const [isTaxAdvantaged, setIsTaxAdvantaged] = useLocalStorage("opts_isTaxAdvantaged", true);
  
  // Tax settings
  const [cgtRate, setCgtRate] = useLocalStorage("opts_cgtRate", "18"); 
  const [cgtAllowance, setCgtAllowance] = useLocalStorage("opts_cgtAllowance", "3000");
  const [useSpouseAllowance, setUseSpouseAllowance] = useLocalStorage("opts_useSpouseAllowance", false);
  
  const [incomeTaxRate, setIncomeTaxRate] = useLocalStorage("opts_incomeTaxRate", "40"); 
  const [employeeNiRate, setEmployeeNiRate] = useLocalStorage("opts_employeeNiRate", "2");
  const [employerNiRate, setEmployerNiRate] = useLocalStorage("opts_employerNiRate", "15");
  const [passEmployerNi, setPassEmployerNi] = useLocalStorage("opts_passEmployerNi", true);

  // Live Price State (Not persisted)
  const [isLoadingPrice, setIsLoadingPrice] = useState(false);
  const [fetchStatus, setFetchStatus] = useState('idle');
  const [fetchMessage, setFetchMessage] = useState('');
  const [sources, setSources] = useState([]);

  const apiKey = ""; // Implicitly provided by environment

  const fetchLivePrice = useCallback(async () => {
    if (!ticker.trim()) {
      setFetchStatus('error');
      setFetchMessage('Please enter a ticker first.');
      return;
    }

    setIsLoadingPrice(true);
    setFetchStatus('idle');
    setFetchMessage('');
    
    const userQuery = `What is the current live share price of ${ticker} in GBP?`;
    const systemPrompt = `Return ONLY the numerical share price of ${ticker} converted to GBP (British Pounds). 
    Rules:
    1. If the stock trades in pence (GBX) like LSE stocks, convert it to pounds (e.g. 8500p -> 85.00). 
    2. If the stock trades in USD or EUR, convert the current price to GBP using the latest exchange rate.
    3. Do not include currency symbols or words, just the raw number.`;

    const fetchWithRetry = async (retries = 0) => {
      try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ parts: [{ text: userQuery }] }],
            systemInstruction: { parts: [{ text: systemPrompt }] },
            tools: [{ "google_search": {} }]
          })
        });

        if (!response.ok) throw new Error('API Error');

        const result = await response.json();
        const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
        const groundings = result.candidates?.[0]?.groundingMetadata?.groundingAttributions?.map(a => ({ 
          uri: a.web?.uri, 
          title: a.web?.title 
        })) || [];

        const match = text.match(/\d+(\.\d{1,4})?/);
        if (match) {
          setSalePrice(match[0]);
          setSources(groundings);
          setFetchStatus('success');
          setFetchMessage('Live price found');
        } else {
          throw new Error('No price found');
        }
      } catch (error) {
        if (retries < 5) {
          const delay = Math.pow(2, retries) * 1000;
          await new Promise(resolve => setTimeout(resolve, delay));
          return fetchWithRetry(retries + 1);
        }
        setFetchStatus('error');
        setFetchMessage('Failed to fetch. Try manual entry.');
      }
    };

    await fetchWithRetry();
    setIsLoadingPrice(false);
  }, [apiKey, ticker, setSalePrice]);

  // Calculations
  const numShares = parseFloat(shares) || 0;
  const pOpt = parseFloat(optionPrice) || 0;
  const pSale = parseFloat(salePrice) || 0;

  const cost = numShares * pOpt;
  const value = numShares * pSale;
  const grossProfit = value - cost;

  let taxTotal = 0;
  let breakdown = { cgt: 0, it: 0, eeNi: 0, erNi: 0 };
  let effectiveCgtAllowance = 0;

  if (grossProfit > 0) {
    if (isTaxAdvantaged) {
      const baseAllowance = parseFloat(cgtAllowance) || 0;
      effectiveCgtAllowance = useSpouseAllowance ? baseAllowance * 2 : baseAllowance;
      const rate = parseFloat(cgtRate) || 0;
      breakdown.cgt = Math.max(0, grossProfit - effectiveCgtAllowance) * (rate / 100);
    } else {
      const itRate = parseFloat(incomeTaxRate) || 0;
      const eeRate = parseFloat(employeeNiRate) || 0;
      const erRate = parseFloat(employerNiRate) || 0;

      if (passEmployerNi) {
        breakdown.erNi = grossProfit * (erRate / 100);
      }
      breakdown.eeNi = grossProfit * (eeRate / 100);
      
      const taxableIncome = Math.max(0, grossProfit - breakdown.erNi);
      breakdown.it = taxableIncome * (itRate / 100);
    }
    taxTotal = breakdown.cgt + breakdown.it + breakdown.eeNi + breakdown.erNi;
  }

  const netResult = grossProfit - taxTotal;
  const effectiveRate = grossProfit > 0 ? (taxTotal / grossProfit) * 100 : 0;

  const fmt = (v) => new Intl.NumberFormat('en-GB', { style: 'currency', currency: 'GBP' }).format(v);

  const taxRateOptions = [
    { label: 'Basic Rate (20%)', value: '20' },
    { label: 'Higher Rate (40%)', value: '40' },
    { label: 'Additional Rate (45%)', value: '45' }
  ];

  return (
    <div className="min-h-screen bg-slate-50 py-8 px-4 font-sans text-slate-900">
      <div className="max-w-5xl mx-auto space-y-6">
        
        <header className="text-center mb-8">
          <h1 className="text-3xl font-bold tracking-tight text-slate-900">Share Options Payout Estimator</h1>
          <p className="text-slate-500 mt-2">UK Tax Calculator with auto-saving to your browser</p>
        </header>

        <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
          
          {/* Inputs Section */}
          <div className="lg:col-span-7 space-y-6">
            <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
              <h2 className="text-xs font-bold uppercase tracking-widest text-slate-400 mb-6">1. Positions & Market</h2>
              
              <div className="mb-4">
                 <InputField 
                    label="Company / Ticker Symbol" 
                    id="ticker"
                    value={ticker} 
                    onChange={setTicker} 
                    type="text"
                    placeholder="e.g. AAPL, TSLA, NXT.L"
                    helperText="Enter a ticker to fetch live pricing."
                  />
              </div>

              <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                <InputField label="Shares" value={shares} onChange={setShares} />
                <InputField label="Grant Price" value={optionPrice} onChange={setOptionPrice} prefix="£" />
                <InputField 
                  label="Current Price" 
                  value={salePrice} 
                  onChange={setSalePrice} 
                  prefix="£"
                  rightElement={
                    <button 
                      onClick={fetchLivePrice}
                      disabled={isLoadingPrice || !ticker.trim()}
                      className="text-xs font-semibold text-indigo-600 flex items-center gap-1 hover:text-indigo-800 disabled:opacity-40 disabled:cursor-not-allowed"
                    >
                      <RefreshIcon className="w-3 h-3" spinning={isLoadingPrice} />
                      {isLoadingPrice ? 'Searching...' : 'Search Live'}
                    </button>
                  }
                  helperText={
                    fetchStatus === 'success' ? <span className="text-emerald-600">{fetchMessage}</span> : 
                    fetchStatus === 'error' ? <span className="text-rose-500">{fetchMessage}</span> : null
                  }
                />
              </div>
            </div>

            <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
              <div className="flex items-center justify-between mb-6">
                <h2 className="text-xs font-bold uppercase tracking-widest text-slate-400">2. Tax Scheme</h2>
                <div className="flex bg-slate-100 p-1 rounded-lg">
                  <button
                    onClick={() => setIsTaxAdvantaged(true)}
                    className={`px-3 py-1.5 text-xs font-bold rounded-md transition-all ${isTaxAdvantaged ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-500 hover:text-slate-700'}`}
                  >
                    EMI/CSOP
                  </button>
                  <button
                    onClick={() => setIsTaxAdvantaged(false)}
                    className={`px-3 py-1.5 text-xs font-bold rounded-md transition-all ${!isTaxAdvantaged ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-500 hover:text-slate-700'}`}
                  >
                    Unapproved
                  </button>
                </div>
              </div>

              {isTaxAdvantaged ? (
                <div className="space-y-4 animate-in fade-in duration-300">
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <InputField label="CGT Rate" value={cgtRate} onChange={setCgtRate} suffix="%" helperText="BADR is 18% from Apr 2026." />
                    <InputField label="Your CGT Allowance" value={cgtAllowance} onChange={setCgtAllowance} prefix="£" helperText="Individual annual exempt amount." />
                  </div>
                  
                  <div className="p-4 bg-slate-50 rounded-xl border border-slate-100 flex items-center justify-between">
                    <div>
                      <p className="text-sm font-bold text-slate-800">Use Spouse's Allowance?</p>
                      <p className="text-xs text-slate-500 mt-0.5 italic">
                        Doubles allowance to {fmt((parseFloat(cgtAllowance) || 0) * 2)} via inter-spouse transfer.
                      </p>
                    </div>
                    <button 
                      onClick={() => setUseSpouseAllowance(!useSpouseAllowance)}
                      className={`w-11 h-6 rounded-full relative transition-colors ${useSpouseAllowance ? 'bg-indigo-600' : 'bg-slate-300'}`}
                    >
                      <div className={`absolute top-1 bg-white w-4 h-4 rounded-full transition-all ${useSpouseAllowance ? 'left-6' : 'left-1'}`} />
                    </button>
                  </div>
                </div>
              ) : (
                <div className="space-y-4 animate-in fade-in duration-300">
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <InputField 
                      label="Income Tax Rate" 
                      value={incomeTaxRate} 
                      onChange={setIncomeTaxRate} 
                      isSelect={true}
                      options={taxRateOptions}
                    />
                    <InputField label="Employee NI" value={employeeNiRate} onChange={setEmployeeNiRate} suffix="%" />
                  </div>
                  
                  <div className="p-4 bg-slate-50 rounded-xl border border-slate-100 flex items-center justify-between">
                    <div>
                      <p className="text-sm font-bold text-slate-800">Pass Employer NI to Employee?</p>
                      <p className="text-xs text-slate-500 mt-0.5 italic">Deductible from gain before Income Tax.</p>
                    </div>
                    <button 
                      onClick={() => setPassEmployerNi(!passEmployerNi)}
                      className={`w-11 h-6 rounded-full relative transition-colors ${passEmployerNi ? 'bg-indigo-600' : 'bg-slate-300'}`}
                    >
                      <div className={`absolute top-1 bg-white w-4 h-4 rounded-full transition-all ${passEmployerNi ? 'left-6' : 'left-1'}`} />
                    </button>
                  </div>

                  {passEmployerNi && (
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                      <InputField label="Employer NI Rate" value={employerNiRate} onChange={setEmployerNiRate} suffix="%" />
                    </div>
                  )}
                </div>
              )}
            </div>
            
            {sources.length > 0 && (
              <div className="text-[10px] text-slate-400 px-2 italic">
                Source: {sources[0].title || 'Financial Market Data'}
              </div>
            )}
          </div>

          {/* Results Sidebar */}
          <div className="lg:col-span-5">
            <div className="bg-slate-900 text-white rounded-3xl p-8 shadow-2xl sticky top-6">
              <h3 className="text-sm font-bold uppercase tracking-widest text-slate-500 mb-8 flex items-center gap-2">
                <CheckCircle className="w-5 h-5 text-indigo-400" /> Estimations
              </h3>
              
              <div className="space-y-5 text-sm">
                <div className="flex justify-between border-b border-slate-800 pb-4">
                  <span className="text-slate-400">Exercise Cost</span>
                  <span className="font-mono">{fmt(cost)}</span>
                </div>
                <div className="flex justify-between border-b border-slate-800 pb-4">
                  <span className="text-slate-400">Total Value</span>
                  <span className="font-mono">{fmt(value)}</span>
                </div>
                <div className="flex justify-between font-bold text-indigo-400 pt-2">
                  <span className="text-base uppercase tracking-wider">Gross Gain</span>
                  <span className="font-mono text-xl">{fmt(grossProfit)}</span>
                </div>
              </div>

              {grossProfit > 0 && (
                <div className="mt-8 bg-slate-800/40 rounded-2xl p-5 border border-slate-700/30">
                  <p className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-4">UK Tax Deductions</p>
                  <div className="space-y-3 text-sm">
                    {isTaxAdvantaged ? (
                      <div className="flex justify-between text-rose-400">
                        <span className="flex flex-col">
                          <span>Capital Gains Tax</span>
                          {useSpouseAllowance && <span className="text-[10px] text-slate-500">(Includes Spousal Transfer)</span>}
                        </span>
                        <span className="font-mono">-{fmt(breakdown.cgt)}</span>
                      </div>
                    ) : (
                      <>
                        {breakdown.erNi > 0 && (
                          <div className="flex justify-between text-rose-400">
                            <span>Employer NI</span>
                            <span className="font-mono">-{fmt(breakdown.erNi)}</span>
                          </div>
                        )}
                        <div className="flex justify-between text-rose-400">
                          <span>Income Tax</span>
                          <span className="font-mono">-{fmt(breakdown.it)}</span>
                        </div>
                        <div className="flex justify-between text-rose-400">
                          <span>Employee NI</span>
                          <span className="font-mono">-{fmt(breakdown.eeNi)}</span>
                        </div>
                      </>
                    )}
                  </div>
                </div>
              )}

              <div className="mt-8 text-center pt-8 border-t border-slate-800">
                <p className="text-[10px] text-slate-500 font-black uppercase tracking-widest mb-3">Actual Take-Home (Net)</p>
                <div className={`text-5xl font-black tracking-tighter ${netResult > 0 ? 'text-white' : 'text-rose-400'}`}>
                  {fmt(netResult)}
                </div>
                {grossProfit > 0 && (
                  <div className="mt-6 flex flex-col items-center gap-2">
                    <p className="px-3 py-1 bg-indigo-500/20 text-indigo-300 text-[10px] font-black rounded-full uppercase tracking-widest border border-indigo-500/30">
                      Effective Tax Rate: {effectiveRate.toFixed(1)}%
                    </p>
                    <p className="text-[10px] text-slate-600 italic">Estimated for UK tax system</p>
                  </div>
                )}
              </div>
            </div>
          </div>

        </div>
      </div>
    </div>
  );
};
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
