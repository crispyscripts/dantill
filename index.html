<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DT Tax Calculator</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-100 min-h-screen">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function TaxCalculator() {
            const [income, setIncome] = useState(0);
            const [tax, setTax] = useState(0);

            const calculateTax = (value) => {
                // Simple example logic: 20% tax
                setIncome(value);
                setTax(value * 0.20);
            };

            return (
                <div class="flex flex-col items-center justify-center p-10">
                    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
                        <h1 class="text-2xl font-bold mb-4 text-blue-600">UK Tax Calculator</h1>
                        
                        <label class="block text-sm font-medium text-gray-700">Annual Income (£)</label>
                        <input 
                            type="number" 
                            class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2"
                            placeholder="e.g. 35000"
                            onChange={(e) => calculateTax(e.target.value)}
                        />

                        <div class="mt-6 p-4 bg-blue-50 rounded-lg">
                            <p class="text-gray-600">Estimated Tax: <span class="font-bold text-blue-800">£{tax.toLocaleString()}</span></p>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TaxCalculator />);
    </script>
</body>
</html>
